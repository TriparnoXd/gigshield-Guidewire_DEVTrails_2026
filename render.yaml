services:
  - type: web
    name: backend
    runtime: docker
    dockerContext: ./gigshield-backend
    dockerfilePath: Dockerfile
    port: 3000
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: ML_SERVICE_URL
        value: http://ml-service:8000
      - key: REDIS_ENABLED
        value: "false"
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: OPENAQ_BASE_URL
        value: https://api.openaq.org/v2
      - key: FIREBASE_SERVER_KEY
        sync: false
      - key: INTERNAL_KEY
        value: internal-secret-key

  - type: web
    name: ml-service
    runtime: docker
    dockerContext: ./model
    dockerfilePath: Dockerfile
    port: 8000

  - type: web
    name: mobile-web
    runtime: docker
    dockerContext: ./mobile
    dockerfilePath: Dockerfile
    port: 80
