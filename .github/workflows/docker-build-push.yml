name: Build and Push Docker Images

on:
  push:
    branches:
      - main
      - develop

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        include:
          - service: backend
            context: ./gigshield-backend
            dockerfile: ./gigshield-backend/Dockerfile
            image: aryan2204/payguard-backend
          - service: ml-service
            context: ./model
            dockerfile: ./model/Dockerfile
            image: aryan2204/payguard-ml-service
          - service: mobile-web
            context: ./mobile
            dockerfile: ./mobile/Dockerfile
            image: aryan2204/payguard-mobile-web

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ matrix.image }}:buildcache
          cache-to: type=registry,ref=${{ matrix.image }}:buildcache,mode=max
